name: Daily Horizon Summary

on:
  schedule:
    - cron: '30 0 * * *'  # Runs daily at 08:30 Asia/Shanghai
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          HORIZON_AI_API_KEY: ${{ secrets.HORIZON_AI_API_KEY }}
          HORIZON_AI_BASE_URL: ${{ secrets.HORIZON_AI_BASE_URL }}
          HORIZON_AI_MODEL: ${{ secrets.HORIZON_AI_MODEL }}
          GITHUB_TOKEN: ${{ secrets.HORIZON_GITHUB_TOKEN || github.token }}
        run: uv run horizon --hours 24

      - name: Build static HTML for Cloudflare Pages
        run: uv run python scripts/build_static_pages.py

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Commit generated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/firsthand.html docs/insights.html docs/daily docs/read docs/data docs/_posts
          if git diff --cached --quiet; then
            echo "No generated HTML changes."
          else
            git commit -m "Daily HTML summary: ${{ env.DATE }}"
            git push
          fi
